<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Book Appointment</title>

<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="appointment-page">

<div class="page-header">

<div>

<h1>
<i class="fas fa-calendar-plus"></i>
Book Appointment
</h1>

<p>Schedule your hospital appointment online</p>

</div>

<a href="/"
class="btn btn-primary">

<i class="fas fa-arrow-left"></i>
Home

</a>

</div>

<div class="profile-card-modern">

<form th:action="@{/bookAppointment}"
th:object="${appointment}"
method="post">

<div class="profile-grid">

<div class="form-group">

<label>Patient Name</label>

<input
type="text"
th:field="*{patientName}"
class="form-control"
required>

</div>

<div class="form-group">

<label>Phone Number</label>

<input
type="text"
th:field="*{phone}"
class="form-control"
required>

</div>

<div class="form-group">

<label>Email</label>

<input
type="email"
th:field="*{email}"
class="form-control">

</div>

<div class="form-group">

<label>Doctor</label>

<input
type="text"
th:field="*{doctorName}"
class="form-control"
placeholder="Enter Doctor Name">

</div>

<div class="form-group">

<label>Appointment Date</label>

<input
type="date"
th:field="*{appointmentDate}"
class="form-control">

</div>

<div class="form-group">

<label>Appointment Time</label>

<input
type="time"
th:field="*{appointmentTime}"
class="form-control">

</div>

<div class="form-group">

<label>Patient Condition</label>

<select
th:field="*{patientCondition}"
class="form-control">

<option value="Normal">Normal</option>

<option value="Serious">Serious</option>

<option value="Critical">Critical</option>

</select>

</div>

<div class="form-group">

<label>Remarks / Symptoms</label>

<textarea
th:field="*{remarks}"
class="form-control"
rows="4"></textarea>

</div>

</div>

<div class="form-actions">

<button
type="submit"
class="btn btn-success">

<i class="fas fa-calendar-check"></i>

Book Appointment

</button>

</div>

</form>

</div>

</div>

</body>

</html>
