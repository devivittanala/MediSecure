
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Doctor</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="doctor-page">

    <!-- Header -->
    <div class="page-header">

        <div>
            <h1>
                <i class="fas fa-user-doctor"></i>
                Edit Doctor
            </h1>

            <p>Update doctor details and availability</p>
        </div>

        <a href="/doctors" class="btn btn-primary">
            ← Back to Doctors
        </a>

    </div>

    <!-- Form Card -->
    <div class="profile-card-modern">

        <form th:action="@{/updateDoctor}"
              th:object="${doctor}"
              method="post">

            <input type="hidden" th:field="*{id}">

            <div class="profile-grid">

                <div class="form-group">
                    <label>Doctor Name</label>
                    <input type="text"
                           th:field="*{doctorName}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Specialization</label>
                    <input type="text"
                           th:field="*{specialization}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Qualification</label>
                    <input type="text"
                           th:field="*{qualification}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Experience</label>
                    <input type="text"
                           th:field="*{experience}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="text"
                           th:field="*{phone}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email"
                           th:field="*{email}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Gender</label>

                    <select th:field="*{gender}"
                            class="form-control">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <input type="text"
                           th:field="*{department}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Consultation Fee</label>
                    <input type="number"
                           th:field="*{consultationFee}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Available Days</label>
                    <input type="text"
                           th:field="*{availableDays}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Available Time</label>
                    <input type="text"
                           th:field="*{availableTime}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Availability Status</label>

                    <select th:field="*{availabilityStatus}"
                            class="form-control">
                        <option value="Available">Available</option>
                        <option value="Busy">Busy</option>
                        <option value="On Leave">On Leave</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>Address</label>

                    <textarea th:field="*{address}"
                              rows="4"
                              class="form-control">
                    </textarea>
                </div>

            </div>

            <div class="form-actions">
                <button type="submit"
                        class="btn btn-success">
                    <i class="fas fa-save"></i>
                    Update Doctor
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
