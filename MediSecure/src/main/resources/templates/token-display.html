<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Token Display</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

</h3>

</div>

</body>
</html>
