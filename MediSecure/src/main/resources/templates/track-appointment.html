<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Track Appointment</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="home-page">

<div class="track-container">

    <div class="track-card">

        <i class="fas fa-search-location track-icon"></i>

        <h1>Track Appointment</h1>

        <p>
            Enter your Appointment ID and OTP
            to check the latest appointment status.
        </p>

        <form action="/trackAppointment" method="get">

            <div class="form-group">

                <label>Appointment ID</label>

                <input type="text"
                       name="appointmentId"
                       placeholder="Enter Appointment ID"
                       required>

            </div>

            <div class="form-group">

                <label>OTP</label>

                <input type="text"
                       name="otp"
                       placeholder="Enter OTP"
                       required>

            </div>

            <button class="btn btn-primary track-btn">

                <i class="fas fa-search"></i>

                Track Appointment

            </button>

        </form>

        <br>

        <a href="/"
           class="btn btn-success">

            <i class="fas fa-arrow-left"></i>

            Back Home

        </a>

    </div>

</div>

</body>
</html>
