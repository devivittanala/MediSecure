
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Update Bill</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="edit-bill-page">

    <div class="page-header">

        <div>
            <h1>
                <i class="fas fa-file-invoice-dollar"></i>
                Update Bill
            </h1>

            <p>
                Modify billing and payment information
            </p>
        </div>

        <a href="/bills" class="btn btn-primary">
            ← Back to Bills
        </a>

    </div>

    <div class="form-card">

        <form th:action="@{/updateBill}"
              th:object="${bill}"
              method="post">

            <input type="hidden" th:field="*{id}">

            <div class="form-grid">

                <div class="form-group">
                    <label>Bill Number</label>
                    <input type="text"
                           th:field="*{billNumber}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Patient Name</label>
                    <input type="text"
                           th:field="*{patientName}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number"
                           th:field="*{amount}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Payment Status</label>

                    <select th:field="*{paymentStatus}"
                            class="form-control">

                        <option value="PAID">Paid</option>
                        <option value="PENDING">Pending</option>
                        <option value="PARTIAL">Partial</option>

                    </select>
                </div>

                <div class="form-group">
                    <label>Bill Date</label>
                    <input type="date"
                           th:field="*{billDate}"
                           class="form-control">
                </div>

            </div>

            <div style="margin-top:25px;">
                <button type="submit"
                        class="btn btn-success">
                    Update Bill
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
