
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Doctor Management</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="doctor-page">

    <!-- Header -->
    <div class="page-header">

        <div>
            <h1>
                <i class="fas fa-user-md"></i>
                Doctor Management
            </h1>

            <p>
                Manage doctors, specializations and availability
            </p>
        </div>

        <div class="header-actions">

            <a href="/dashboard" class="btn btn-primary">
                ← Dashboard
            </a>

            <a href="/addDoctor" class="btn btn-success">
                + Add Doctor
            </a>

        </div>

    </div>

    <!-- Search -->
    <form action="/searchDoctors" method="get" class="search-form">

        <input type="text"
               name="keyword"
               placeholder="🔍 Search doctor, specialization or phone">

        <button type="submit" class="btn btn-primary">
            Search
        </button>

        <a href="/doctors" class="btn btn-secondary">
            Reset
        </a>

    </form>

    <!-- Statistics -->
    <div class="stats-grid">

        <div class="stat-card">
            <i class="fas fa-user-md"></i>
            <h3>Total Doctors</h3>
            <h1 th:text="${doctorCount}">0</h1>
        </div>

        <div class="stat-card">
            <i class="fas fa-stethoscope"></i>
            <h3>Specializations</h3>
            <h1 th:text="${specializationCount}">0</h1>
        </div>

        <div class="stat-card">
            <i class="fas fa-check-circle"></i>
            <h3>Available</h3>
            <h1 th:text="${availableDoctors}">0</h1>
        </div>

    </div>

    <!-- Doctor Table -->
    <div class="table-card">

        <table class="doctor-table">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Doctor</th>
                    <th>Specialization</th>
                    <th>Qualification</th>
                    <th>Experience</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Profile</th>
                    <th>Edit</th>
                    
                    <th>Delete</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>

            <tr th:each="d : ${doctors}">

                <td th:text="${d.id}"></td>

                <td>
                    👨‍⚕️
                    <span th:text="${d.doctorName}"></span>
                </td>

                <td>
                    <span class="specialization-badge"
                          th:text="${d.specialization}">
                    </span>
                </td>

                <td th:text="${d.qualification}"></td>

                <td th:text="${d.experience}"></td>

                <td th:text="${d.phone}"></td>

                <td th:text="${d.email}"></td>

                <td>
    <a th:href="@{/doctor/{id}(id=${d.id})}"
       class="btn btn-primary">
        View
    </a>
</td>

<td>
    <a th:href="@{/editDoctor/{id}(id=${d.id})}"
       class="btn btn-success">
        Edit
    </a>
</td>

<td>
    <a th:href="@{/deleteDoctor/{id}(id=${d.id})}"
       class="btn btn-danger"
       onclick="return confirm('Are you sure you want to delete this doctor?')">
        Delete
    </a>
</td>

                <td>
                    <span th:text="${d.availabilityStatus}"
                          class="available-badge">
                    </span>
                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
```
