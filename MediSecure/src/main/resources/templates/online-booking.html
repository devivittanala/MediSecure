<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Appointment</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="form-container">

    <h2>Book Appointment Online</h2>

    <form th:action="@{/bookAppointment}"
          th:object="${appointment}"
          method="post">

        <div class="form-group">
            <label>Patient Name</label>
            <input type="text"
                   th:field="*{patientName}"
                   class="form-control"
                   required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text"
                   th:field="*{phone}"
                   class="form-control"
                   required>
        </div>

        <div class="form-group">

    <label>Email Address</label>

    <input type="email"
           th:field="*{email}"
           class="form-control"
           placeholder="Enter Email Address"
           required>

</div>
        <div class="form-group">
            <label>Doctor Name</label>
            <input type="text"
                   th:field="*{doctorName}"
                   class="form-control"
                   required>
        </div>

        <div class="form-group">
            <label>Date</label>
            <input type="date"
                   th:field="*{appointmentDate}"
                   class="form-control"
                   required>
        </div>

        <div class="form-group">
            <label>Time</label>
            <input type="time"
                   th:field="*{appointmentTime}"
                   class="form-control"
                   required>
        </div>

        <button type="submit"
                class="btn btn-success">
            Book Appointment
        </button>

    </form>

</div>

</body>
</html>
