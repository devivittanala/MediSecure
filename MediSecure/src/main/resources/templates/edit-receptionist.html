<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Edit Receptionist</title>

<link rel="stylesheet" th:href="@{/css/style.css}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="dashboard-body">

<div class="container">

    <!-- Header -->

    <div class="page-header">

        <div>

            <h1>
                <i class="fas fa-user-edit"></i>
                Edit Receptionist
            </h1>

            <p>Administrator Management Panel</p>

        </div>

        <a href="/admin/receptionists"
           class="btn btn-primary">

            <i class="fas fa-arrow-left"></i>
            Back

        </a>

    </div>

    <!-- Card -->

    <div class="profile-card-modern">

        <form th:action="@{/admin/updateReceptionist}"
              th:object="${receptionist}"
              method="post">

            <input type="hidden"
                   th:field="*{id}">

            <div class="profile-grid">

                <!-- Name -->

                <div class="form-group">

                    <label>Name</label>

                    <input type="text"
                           th:field="*{name}"
                           class="form-control">

                </div>

                <!-- Employee ID -->

                <div class="form-group">

                    <label>Employee ID</label>

                    <input type="text"
                           th:field="*{employeeId}"
                           class="form-control">

                </div>

                <!-- Department -->

                <div class="form-group">

                    <label>Department</label>
<select th:field="*{department}" class="form-control">

    <option value="Reception">Reception</option>

    <option value="Emergency">Emergency</option>

    <option value="Billing">Billing</option>

    <option value="Administration">Administration</option>

</select>

                </div>

                <!-- Shift -->

                <div class="form-group">

                    <label>Shift Timing</label>

<select th:field="*{shiftTiming}" class="form-control">

    <option value="09:00 AM - 06:00 PM">
        09:00 AM - 06:00 PM
    </option>

    <option value="08:00 AM - 04:00 PM">
        08:00 AM - 04:00 PM
    </option>

    <option value="02:00 PM - 10:00 PM">
        02:00 PM - 10:00 PM
    </option>

    <option value="Night Shift">
        Night Shift
    </option>

</select>
                </div>

                <!-- Email -->

                <div class="form-group">

                    <label>Email</label>

                    <input type="email"
                           th:field="*{email}"
                           class="form-control">

                </div>

                <!-- Phone -->

                <div class="form-group">

                    <label>Phone</label>

                    <input type="text"
                           th:field="*{phone}"
                           class="form-control">

                </div>

                <!-- Username -->

                <div class="form-group">

                    <label>Username</label>

                    <input type="text"
                           th:field="*{username}"
                           class="form-control">

                </div>

                <!-- Password -->

                <div class="form-group">

                    <label>Password</label>

                    <input type="text"
                           th:field="*{password}"
                           class="form-control">

                </div>

            </div>

            <div class="button-group">

                <button type="submit"
                        class="btn btn-success">

                    <i class="fas fa-save"></i>
                    Update Receptionist

                </button>

                <a href="/admin/receptionists"
                   class="btn btn-danger">

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
