<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reception Reports</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="patient-page">

    <!-- Header -->
    <div class="page-header">

        <div>
            <h1>
                <i class="fas fa-chart-line"></i>
                Reception Reports
            </h1>

            <p>
                Daily operational reports and performance metrics
            </p>
        </div>

        <a href="/reception/dashboard"
           class="btn btn-primary">

            <i class="fas fa-arrow-left"></i>
            Dashboard

        </a>

    </div>

    <!-- Statistics -->
    <div class="stats-grid">

        <div class="stat-card">
            <i class="fas fa-calendar-check"></i>

            <h3>Total Appointments</h3>

            <h1 th:text="${appointmentCount}">
                0
            </h1>
        </div>

        <div class="stat-card">
            <i class="fas fa-check-circle"></i>

            <h3>Completed</h3>

            <h1 th:text="${completedCount}">
                0
            </h1>
        </div>

        <div class="stat-card">
            <i class="fas fa-clock"></i>

            <h3>Pending</h3>

            <h1 th:text="${pendingCount}">
                0
            </h1>
        </div>

        <div class="stat-card">
            <i class="fas fa-user-injured"></i>

            <h3>Total Patients</h3>

            <h1 th:text="${patientCount}">
                0
            </h1>
        </div>

        <div class="stat-card">
            <i class="fas fa-file-invoice-dollar"></i>

            <h3>Bills Viewed</h3>

            <h1 th:text="${billCount}">
                0
            </h1>
        </div>

    </div>

    <!-- Recent Appointments -->
    <div class="table-card">

        <h2 style="margin-bottom:20px;">
            Recent Appointments
        </h2>

        <table class="patient-table">

            <thead>
            <tr>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Date</th>
                <th>Status</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="a : ${appointments}">

                <td th:text="${a.patientName}"></td>

                <td th:text="${a.doctorName}"></td>

                <td th:text="${a.appointmentDate}"></td>

                <td>
                    <span class="status-badge"
                          th:text="${a.appointmentStatus}">
                    </span>
                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
