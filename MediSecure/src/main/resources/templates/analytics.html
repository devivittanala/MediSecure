<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Analytics Dashboard</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="patient-page">

    <div class="page-header">

        <div>
            <h1>
                <i class="fas fa-chart-line"></i>
                Hospital Analytics
            </h1>
            <p>Monitor hospital performance and statistics</p>
        </div>

        <div class="header-actions">
            <a href="/dashboard" class="btn btn-primary">
                ← Dashboard
            </a>
        </div>

    </div>

    <!-- Analytics Cards -->
    <div class="stats-grid">

        <div class="stat-card">
            <i class="fas fa-users"></i>
            <h3>Total Patients</h3>
            <h1 th:text="${patientCount}">0</h1>
        </div>

        <div class="stat-card">
            <i class="fas fa-user-md"></i>
            <h3>Total Doctors</h3>
            <h1 th:text="${doctorCount}">0</h1>
        </div>

        <div class="stat-card">
            <i class="fas fa-calendar-check"></i>
            <h3>Appointments</h3>
            <h1 th:text="${appointmentCount}">0</h1>
        </div>

        <div class="stat-card">
            <i class="fas fa-file-invoice-dollar"></i>
            <h3>Total Bills</h3>
            <h1 th:text="${billCount}">0</h1>
        </div>

        <div class="stat-card">
            <i class="fas fa-indian-rupee-sign"></i>
            <h3>Total Revenue</h3>
            <h1>₹ <span th:text="${totalRevenue}"></span></h1>
        </div>

    </div>

    <!-- Analytics Summary -->
    <div class="table-card">

        <h2>Analytics Summary</h2>

        <table class="patient-table">

            <tr>
                <th>Metric</th>
                <th>Value</th>
            </tr>

            <tr>
                <td>Total Patients</td>
                <td th:text="${patientCount}"></td>
            </tr>

            <tr>
                <td>Total Doctors</td>
                <td th:text="${doctorCount}"></td>
            </tr>

            <tr>
                <td>Total Appointments</td>
                <td th:text="${appointmentCount}"></td>
            </tr>

            <tr>
                <td>Total Bills</td>
                <td th:text="${billCount}"></td>
            </tr>

            <tr>
                <td>Total Revenue</td>
                <td>₹ <span th:text="${totalRevenue}"></span></td>
            </tr>

        </table>

    </div>

</div>

</body>
</html>
