
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Appointment</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="appointment-page">

    <!-- Header -->
    <div class="page-header">

        <div>
            <h1>
                <i class="fas fa-calendar-plus"></i>
                Add Appointment
            </h1>
            <p>Schedule a new patient appointment</p>
        </div>

        <a href="/reception/dashboard"
           class="btn btn-primary">
            ← Back to dashboard
        </a>

    </div>

    <!-- Form Card -->
    <div class="profile-card-modern">

       <form th:action="@{/reception/saveAppointment}"
      th:object="${appointment}"
      method="post">

            <input type="hidden"
                   th:field="*{appointmentId}">

            <div class="profile-grid">

                <div class="form-group">
                    <label>Patient Name</label>
                    <input type="text"
                           th:field="*{patientName}"
                           class="form-control"
                           placeholder="Enter Patient Name">
                </div>

                <div class="form-group">
                    <label>Doctor Name</label>
                    <input type="text"
                           th:field="*{doctorName}"
                           class="form-control"
                           placeholder="Enter Doctor Name">
                </div>

                <div class="form-group">
                    <label>Appointment Date</label>
                    <input type="date"
                           th:field="*{appointmentDate}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Appointment Time</label>
                    <input type="time"
                           th:field="*{appointmentTime}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Patient Condition</label>
                    <select th:field="*{patientCondition}"
                            class="form-control">
                        <option value="Normal">Normal</option>
                        <option value="Serious">Serious</option>
                        <option value="Critical">Critical</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Appointment Status</label>
                    <select th:field="*{appointmentStatus}"
                            class="form-control">
                        <option value="Pending">Pending</option>
                        <option value="Confirmed">Confirmed</option>
                        <option value="Completed">Completed</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Queue Status</label>
                    <select th:field="*{queueStatus}"
                            class="form-control">
                        <option value="Waiting">Waiting</option>
                        <option value="In Consultation">In Consultation</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>

            </div>

            <div class="form-actions">

                <button type="submit"
                        class="btn btn-success">
                    <i class="fas fa-save"></i>
                    Save Appointment
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
