<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Receptionist</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="patient-page">

    <!-- Header -->
    <div class="page-header">

        <div>
            <h1>
                <i class="fas fa-user-tie"></i>
                Add Receptionist
            </h1>

            <p>
                Register a new receptionist
            </p>
        </div>

        <a href="/admin/receptionists"
           class="btn btn-primary">

            ← Back

        </a>

    </div>

    <!-- Form -->
    <div class="profile-card-modern">

        <form action="/admin/saveReceptionist"
              method="post">

            <div class="profile-grid">

                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text"
                           name="employeeId"
                           class="form-control"
                           required>
                </div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text"
                           name="name"
                           class="form-control"
                           required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email"
                           name="email"
                           class="form-control"
                           required>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="text"
                           name="phone"
                           class="form-control"
                           required>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <input type="text"
                           name="department"
                           value="Reception"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Shift Timing</label>
                    <select name="shiftTiming"
                            class="form-control">

                        <option>09:00 AM - 06:00 PM</option>
                        <option>08:00 AM - 04:00 PM</option>
                        <option>02:00 PM - 10:00 PM</option>

                    </select>
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text"
                           name="username"
                           class="form-control"
                           required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password"
                           name="password"
                           class="form-control"
                           required>
                </div>

                <div class="form-group full-width">
                    <label>Address</label>
                    <textarea name="address"
                              rows="4"
                              class="form-control">
                    </textarea>
                </div>

            </div>

            <div class="form-actions">

                <button type="submit"
                        class="btn btn-success">

                    <i class="fas fa-save"></i>
                    Save Receptionist

                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
