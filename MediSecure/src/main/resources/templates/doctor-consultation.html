<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Consultation</title>

<link rel="stylesheet"
      th:href="@{/css/style.css}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="doctor-dashboard">

    <div class="page-header">

        <div>

            <h1>
                <i class="fas fa-stethoscope"></i>
                Current Consultation
            </h1>

        </div>

        <a href="/doctor/waiting-queue"
           class="btn btn-primary">

            Back Queue

        </a>

    </div>

    <div class="table-card">

        <h2 th:text="${appointment.patientName}">
            Patient Name
        </h2>

        <hr>

        <p>
            <b>Token :</b>
            <span th:text="${appointment.tokenNumber}"></span>
        </p>

        <p>
            <b>Condition :</b>
            <span th:text="${appointment.patientCondition}"></span>
        </p>

        <p>
            <b>Date :</b>
            <span th:text="${appointment.appointmentDate}"></span>
        </p>

        <p>
            <b>Time :</b>
            <span th:text="${appointment.appointmentTime}"></span>
        </p>

        <br>

        <a th:href="@{/doctor/complete/{id}(id=${appointment.id})}"
           class="btn btn-success">

            Mark Completed

        </a>

    </div>

</div>

</body>
</html>
