
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Doctor</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="doctor-page">

    <!-- Header -->
    <div class="page-header">

        <div>
            <h1>
                <i class="fas fa-user-doctor"></i>
                Add Doctor
            </h1>
            <p>Register new doctor details and availability</p>
        </div>

        <a href="/doctors" class="btn btn-primary">
            ← Back to Doctors
        </a>

    </div>

    <!-- Form Card -->
    <div class="profile-card-modern">

        <form th:action="@{/saveDoctor}"
              th:object="${doctor}"
              method="post">

            <div class="profile-grid">

                <div class="form-group">
                    <label>Doctor Name</label>
                    <input type="text"
                           th:field="*{doctorName}"
                           class="form-control"
                           required>
                </div>

                <div class="form-group">
                    <label>Specialization</label>
                    <input type="text"
                           th:field="*{specialization}"
                           class="form-control"
                           required>
                </div>

                <div class="form-group">
                    <label>Qualification</label>
                    <input type="text"
                           th:field="*{qualification}"
                           class="form-control"
                           required>
                </div>

                <div class="form-group">
                    <label>Experience</label>
                    <input type="text"
                           th:field="*{experience}"
                           class="form-control"
                           required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text"
                           th:field="*{phone}"
                           class="form-control"
                           required>
                </div>

               <div class="form-group">
    <label>Email Address</label>
    <input type="email"
           th:field="*{email}"
           class="form-control"
           required>
</div>

<div class="form-group">
    <label>Username</label>
    <input type="text"
           th:field="*{username}"
           class="form-control"
           placeholder="Enter Username"
           required>
</div>

<div class="form-group">
    <label>Password</label>
    <input type="password"
           th:field="*{password}"
           class="form-control"
           placeholder="Enter Password"
           required>
</div>

                <div class="form-group">
                    <label>Gender</label>

                    <select th:field="*{gender}"
                            class="form-control">

                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>

                    </select>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <input type="text"
                           th:field="*{department}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Consultation Fee (₹)</label>
                    <input type="number"
                           th:field="*{consultationFee}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Available Days</label>
                    <input type="text"
                           th:field="*{availableDays}"
                           class="form-control"
                           placeholder="Mon - Fri">
                </div>

                <div class="form-group">
                    <label>Available Time</label>
                    <input type="text"
                           th:field="*{availableTime}"
                           class="form-control"
                           placeholder="10:00 AM - 5:00 PM">
                </div>

                <div class="form-group">
                    <label>Availability Status</label>

                    <select th:field="*{availabilityStatus}"
                            class="form-control">

                        <option value="Available">Available</option>
                        <option value="Busy">Busy</option>
                        <option value="On Leave">On Leave</option>

                    </select>
                </div>

                <div class="form-group full-width">
                    <label>Address</label>

                    <textarea th:field="*{address}"
                              rows="4"
                              class="form-control">
                    </textarea>
                </div>

            </div>

            <div class="form-actions">

                <button type="submit"
                        class="btn btn-success">
                    <i class="fas fa-save"></i>
                    Save Doctor
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
