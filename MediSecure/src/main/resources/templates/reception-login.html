<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Reception Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="login-page">

<div class="login-container">

    <div class="login-card">

        <div class="login-icon">

<i class="fas fa-user-nurse"></i>
        </div>

<h1>Reception Login</h1>
        <p>
            MediSecure Hospital Management System
        </p>

<form action="/reception/login" method="post">
            <div class="form-group">
             <div th:if="${param.error}"

     style="color:red;

            text-align:center;

            margin-bottom:15px;

            font-weight:bold;">

    Invalid Reception Username or Password

</div>

                <label>Username</label>

                <input type="text"
                       name="username"
                       placeholder="Enter Username"
                       required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input type="password"
                       name="password"
                       placeholder="Enter Password"
                       required>

            </div>

            <button class="btn btn-primary login-btn">

                Login

            </button>

        </form>

        <br>

        <a href="/"
           class="btn btn-success">

            ← Back Home

        </a>
       

    </div>
    

</div>

</body>
</html>
