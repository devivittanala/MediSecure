
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Update Patient</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="patient-page">

    <!-- Header -->
    <div class="page-header">

        <div>
            <h1>
                <i class="fas fa-user-edit"></i>
                Update Patient
            </h1>
            <p>Edit and manage patient information</p>
        </div>

        <a href="/patients" class="btn btn-primary">
            ← Back to Patients
        </a>

    </div>

    <!-- Form Card -->
    <div class="profile-card-modern">

        <form th:action="@{/updatePatient}"
              th:object="${patient}"
              method="post">

            <input type="hidden" th:field="*{id}">

            <div class="profile-grid">

                <div class="form-group">
                    <label>Patient ID</label>
                    <input type="text"
                           th:field="*{patientId}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>First Name</label>
                    <input type="text"
                           th:field="*{firstName}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text"
                           th:field="*{lastName}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Age</label>
                    <input type="number"
                           th:field="*{age}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <select th:field="*{gender}"
                            class="form-control">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Blood Group</label>
                    <input type="text"
                           th:field="*{bloodGroup}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Disease</label>
                    <input type="text"
                           th:field="*{disease}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Doctor Assigned</label>
                    <input type="text"
                           th:field="*{doctorAssigned}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="text"
                           th:field="*{phone}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email"
                           th:field="*{email}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Emergency Contact</label>
                    <input type="text"
                           th:field="*{emergencyContact}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Admission Date</label>
                    <input type="date"
                           th:field="*{admissionDate}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select th:field="*{status}"
                            class="form-control">
                        <option value="Admitted">Admitted</option>
                        <option value="Under Treatment">Under Treatment</option>
                        <option value="Discharged">Discharged</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>Address</label>
                    <textarea th:field="*{address}"
                              rows="4"
                              class="form-control"></textarea>
                </div>

            </div>

            <div class="form-actions">

                <button type="submit"
                        class="btn btn-success">
                    <i class="fas fa-save"></i>
                    Update Patient
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
